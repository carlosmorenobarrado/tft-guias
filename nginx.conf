server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fix redirects for Cloud Run (don't include port in redirect URLs)
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML files - no cache (for updates)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Handle clean URLs (Astro generates /comps/slug/index.html)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404 page (optional, falls back to nginx default)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
